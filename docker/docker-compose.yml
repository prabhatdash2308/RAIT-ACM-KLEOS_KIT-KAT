services:
  postgres:
    image: postgres:16-alpine
    container_name: digirakshak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: digirakshak
      POSTGRES_PASSWORD: digirakshak
      POSTGRES_DB: digirakshak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digirakshak"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digirakshak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: digirakshak-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://digirakshak:digirakshak@postgres:5432/digirakshak?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-digirakshak-dev-access-secret-key-32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-digirakshak-dev-refresh-secret-key-32}
      AES_ENCRYPTION_KEY: ${AES_ENCRYPTION_KEY:-digirakshak-dev-aes-key-32bytes!!}
      NODE_ENV: production
      BACKEND_PORT: 4000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: digirakshak-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_APP_NAME: DigiRakshak
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
